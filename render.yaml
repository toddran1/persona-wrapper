# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

# Hosted development environment. Local development continues to use the
# existing local .env files and Docker Postgres configuration. Production
# resources can be added later with distinct -prod names and credentials.
services:
  - type: web
    runtime: node
    name: for-the-baddiez-api-dev
    region: ohio
    plan: starter
    autoDeployTrigger: commit
    # TypeScript's declarations are build-time dev dependencies. Keep the
    # service's production mode scoped to migration and runtime commands.
    buildCommand: npm ci --include=dev && npm run build -w @persona/shared && npm run build -w @persona/api
    preDeployCommand: NODE_ENV=production npm run db:migrate -w @persona/api
    startCommand: NODE_ENV=production npm run start -w @persona/api
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - apps/api/**
        - packages/shared/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: APP_TEST_MODE
        value: "false"
      # Render terminates HTTPS one proxy hop in front of the Node service.
      - key: API_TRUST_PROXY_HOPS
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: for-the-baddiez-db-dev
          property: connectionString

      # These URLs depend on the stable service names in this file.
      # Update all four if Render assigns a different subdomain.
      - key: WEB_APP_URL
        value: https://for-the-baddiez-web-dev.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://for-the-baddiez-web-dev.onrender.com
      - key: OBSERVABILITY_DASHBOARD_TOKEN
        sync: false
      # Copy the endpoint and Authorization header from the Grafana Cloud
      # OpenTelemetry connection. Both stay disabled until configured.
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      - key: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      - key: OTEL_SERVICE_NAME
        value: for-the-baddiez-api-dev
      - key: OTEL_RESOURCE_ATTRIBUTES
        value: deployment.environment.name=development,service.namespace=for-the-baddiez
      - key: OTEL_TRACES_SAMPLER
        value: parentbased_traceidratio
      - key: OTEL_TRACES_SAMPLER_ARG
        value: "0.25"
      - key: BETTER_AUTH_URL
        value: https://for-the-baddiez-api-dev.onrender.com
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: GMAIL_SMTP_USER
        value: forthebaddiez.ai@gmail.com
      - key: GMAIL_SMTP_APP_PASSWORD
        sync: false

      - key: AUTH_REQUIRED
        value: "true"
      - key: AUTH_REQUIRE_OWNED_MEDIA_ACCESS
        value: "true"
      - key: AUTH_REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: AUTH_ACCOUNT_DELETION_GRACE_DAYS
        value: "30"

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-luna
      - key: OPENAI_TOOL_ROUTER_MODEL
        value: gpt-5.6-luna
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: OPENAI_ENABLE_WEB_SEARCH
        value: "true"
      - key: OPENAI_ENABLE_FILE_SEARCH
        value: "true"
      - key: OPENAI_ENABLE_CODE_INTERPRETER
        value: "true"
      - key: OPENAI_ENABLE_IMAGE_GENERATION
        value: "true"
      - key: OPENAI_DIRECT_IMAGE_API_ENABLED
        value: "true"

      - key: TTS_PROVIDER
        value: elevenlabs
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_VOICE_ID_LARAE
        sync: false

      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_OAUTH_CLIENT_SECRET
        sync: false

      - key: STORAGE_DRIVER
        value: s3
      - key: STORAGE_S3_BUCKET
        sync: false
      - key: STORAGE_S3_REGION
        sync: false
      - key: STORAGE_S3_PREFIX
        value: development
      - key: STORAGE_S3_FORCE_PATH_STYLE
        value: "false"
      - key: DATA_TRANSFER_ARCHIVE_MAX_BYTES
        value: "5368709120"
      - key: DATA_TRANSFER_JSON_MAX_BYTES
        value: "134217728"
      - key: DATA_TRANSFER_PRESIGNED_UPLOAD_TTL_SECONDS
        value: "18000"
      - key: DATA_TRANSFER_RATE_LIMIT_REQUESTS
        value: "10"
      - key: DATA_TRANSFER_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: DATA_TRANSFER_JOB_TTL_HOURS
        value: "24"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  - type: web
    runtime: static
    name: for-the-baddiez-web-dev
    autoDeployTrigger: commit
    buildCommand: npm ci --include=dev && npm run build -w @persona/shared && npm run build -w @persona/web
    staticPublishPath: ./apps/web/dist
    buildFilter:
      paths:
        - apps/web/**
        - packages/shared/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: VITE_API_URL
        value: https://for-the-baddiez-api-dev.onrender.com
      - key: VITE_SUPPORT_EMAIL
        value: support@forthebaddiez.com
      - key: VITE_TEST_MODE
        value: "false"
      - key: VITE_TELEMETRY_ENABLED
        value: "true"
      - key: VITE_TELEMETRY_SAMPLE_RATE
        value: "0.25"
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), geolocation=(), payment=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: for-the-baddiez-db-dev
    region: ohio
    plan: basic-256mb
    diskSizeGB: 5
    storageAutoscalingEnabled: false
    postgresMajorVersion: "17"
    databaseName: for_the_baddiez_dev
    user: for_the_baddiez_dev
    connectionPool: none
    ipAllowList: []
