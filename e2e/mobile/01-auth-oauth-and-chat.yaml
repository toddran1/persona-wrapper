appId: com.personawrapper.mobile
name: Auth, OAuth, chat, audio, and background work
env:
  E2E_EMAIL: e2e-device@for-the-baddiez.test
  E2E_PASSWORD: E2eSecurePassword!42
---
- launchApp:
    clearState: true
- tapOn:
    id: mobile-auth-mode-register
- tapOn:
    id: mobile-auth-identifier
- inputText: ${E2E_EMAIL}
- tapOn:
    id: mobile-auth-password
- inputText: ${E2E_PASSWORD}
- tapOn:
    id: mobile-auth-submit
- assertVisible: LaRae the Baddest
- tapOn:
    id: mobile-chat-composer
- inputText: Device E2E chat message
- tapOn:
    id: mobile-send-message
- assertVisible: Device E2E chat message
- tapOn:
    id: mobile-chat-composer
- inputText: Run this long-running task in the background for device E2E.
- tapOn:
    id: mobile-send-message
- assertVisible: Run this long-running task in the background for device E2E.
- tapOn:
    id: mobile-persona-audio-options
- assertVisible: Turn on persona audio
